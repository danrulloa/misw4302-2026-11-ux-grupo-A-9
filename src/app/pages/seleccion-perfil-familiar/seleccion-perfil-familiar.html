<section class="seleccion">
  <app-page-background />

  <div class="seleccion__logo">
    <img src="assets/images/pattern-bg-54c89a.png" alt="Logo" />
  </div>

  <div class="seleccion__content">
    <h1 class="seleccion__title">¿Qué perfil quieres gestionar?</h1>
    <p class="seleccion__subtitle">
      Selecciona tu perfil o uno de tu familia para administrar alarmas de medicamentos.
    </p>

    <div class="seleccion__profile-area">
      <app-profile-card
        initials="C"
        profileName="Nombre"
        relation="(Tu Perfil)"
        (enterClicked)="onEnterMainProfile()"
      />
    </div>

    <app-divider />

    <div class="seleccion__family-section">
      <div class="seleccion__family-content">
        <h2 class="seleccion__family-title">PERFILES DE FAMILIA</h2>
        <p class="seleccion__family-desc">
          Crea y administra perfiles de familiares para gestionar sus alarmas y seguimiento.
        </p>
      </div>
      <app-add-family-card (addClicked)="onAddFamily()" />
    </div>

    <div class="seleccion__profile-area seleccion__profile-area--family">
      <app-profile-card
        initials="C"
        profileName="Nombre perfil familiar"
        relation="(Perfil [relación contigo])"
        (enterClicked)="onEnterFamilyProfile()"
      />
    </div>
  </div>
</section>
